services:
  rabbitmq:
    build:
      context: ./src/rabbitmq
      dockerfile: Dockerfile
    container_name: rabbitmq
    environment:
      - RABBITMQ_LOG_LEVELS=error
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 10s
      test: rabbitmq-diagnostics check_port_connectivity
      timeout: 3s
    ports:
      - 5672:5672
      - 15672:15672

  gateway:
    build:
      context: ./src
      dockerfile: gateway/Dockerfile
    container_name: gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - SERVER_HOST=gateway
      - SERVER_PORT=5678
      - MOM_HOST=rabbitmq
      - INPUT_QUEUE=gateway_results_queue
      - BANK_DEDUPLICATOR_QUEUE=bank_deduplicator_queue
      - CURRENCY_FILTER_QUEUE=currency_filter_queue
      - DATE_FILTER_QUEUE=date_filter_queue
  date_filter_0:
