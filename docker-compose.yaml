services:
  rabbitmq:
    build:
      context: ./src/rabbitmq
      dockerfile: Dockerfile
    container_name: rabbitmq
    environment:
      - RABBITMQ_LOG_LEVELS=error
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 10s
      test: rabbitmq-diagnostics check_port_connectivity
      timeout: 3s
    ports:
      - 5672:5672
      - 15672:15672

  gateway:
    build:
      context: ./src
      dockerfile: gateway/Dockerfile
    container_name: gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - SERVER_HOST=gateway
      - SERVER_PORT=5678
      - MOM_HOST=rabbitmq
      - OUTPUT_QUEUE=transfer_data_controller_queue
      - INPUT_QUEUE=gateway_results_queue

  transfer_data_controller_0:
    build:
      context: ./src
      dockerfile: entities/Dockerfile
    container_name: transfer_data_controller_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - PROCESSING_DELAY_SECONDS=0
      - ENTITY_CLASS=TransferDataController
      - MOM_HOST=rabbitmq
      - INPUT_QUEUE=transfer_data_controller_queue
      - OUTPUT_QUEUE=currency_filter_queue
      - TOTAL_DEDUPLICATORS=4
      - TOTAL_REDUCERS=3

  currency_filter_0:
    build:
      context: ./src
      dockerfile: entities/Dockerfile
    container_name: currency_filter_0
    depends_on:
