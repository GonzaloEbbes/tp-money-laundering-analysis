      - MOM_HOST=rabbitmq
      - INPUT_QUEUE=conversion_shard_router_queue
      - OUTPUT_QUEUE=currency_converter_queue
      - TOTAL_CONVERSION_WORKERS=4
      - CONVERSION_CONVERTER_QUEUE_PREFIX=currency_converter_queue
      - CONVERSION_ERROR_QUEUE=gateway_results_queue

  currency_converter_0:
    build:
      context: ./src
      dockerfile: entities/Dockerfile
    container_name: currency_converter_0
